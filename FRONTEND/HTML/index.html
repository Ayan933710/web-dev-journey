<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>Hello World</p>
    <p>Hii <b>Narayan</b></p>
    <pre>
     This is the First Website.
      I am learning HTML.
    </pre>
    <ol type="a">
      <li>Apple</li>
      <li>Banana</li>
      <li>Grapes</li>
    </ol>
    <a href="https://www.google.com" target="_blank">Go to Google</a>
    <br />
    <a href="https://www.netflix.com"
      ><img src="netflix_logo.png" alt="Netflix"
    /></a>
    <br />
    <img
      src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScHl9SrAQMxtdOEPF3zEuuipen7QFg2uTiQQ&s"
      alt="CAT"
      width="200"
      height="150"
    />
    <br />
    <hr />
    <br />
    <!-- Displaying special characters: Go to mdn html entities for all symbols name -->
    <p>&lt; Hii &gt;</p>
    <p>Heart &hearts;</p>
    <!-- creating a table -->
    <table>
      <caption><u>Food Menu</u></caption>
      <tr>
        <th rowspan="2">Item</th>
        <th colspan="2">Price</th>
        <tr>
          <th>INR</th>
          <th>USD</th>
        </tr>
      </tr>
      <tr>
        <th>Burger</th>
        <td>50</td>
        <td>0.60</td>
      </tr>
<tr>
        <th>Samosa</th>
        <td>20</td>
        <td>0.25</td>
      </tr>
<tr>
        <th>Chips</th>
        <td>30</td>
        <td>0.35</td>
</tr>
    </table>
    <!-- creating a form -->
     <form action="/action">
      <label>
        Username:
        <input type="text" placeholder="Enter Username" />
      </label>
      <br />
      <label>
        Password:
        <input type="password" placeholder="Enter Password" />
      </label>
      <br />
      <button type="submit">Login</button>
      <br/>
     </form>
     <form action="https://www.google.com/search">
      <label>
        Search in Google:
        <input type="search" placeholder="Search here" name="q" />
      </label>
     </form>
     <form action="/subscribe">
      <div>
      <input type="checkbox" name="age" id="age1" />
      <label for="age1">I am above 18 years of age.</label>
      </form>
     </div>
      <br />
      <div>
        Choose your Profession:
        <select name="profession" id="profession">
          <option value="student">Student</option>
          <option value="engineer">Engineer</option>
          <option value="doctor">Doctor</option>
          <option value="artist">Artist</option>
        </select>
      </div>
      <br />
      <div>
        Select volume level:
        <input type="range" name="volume" id="volume" min="0" max="100" />
        <input type="range" name="volume" id="volume" min="0" max="100" step="10" value="50" />
      </div>
      </form> 
  </body>
</html>
